services:
  api_server:
    build:
      context: ./api_server
      dockerfile: Dockerfile
    container_name: moosinsa_api
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=moosinsa
      - DB_PASSWORD=moosinsa1234
      - DB_NAME=mss_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LLM_SERVER_URL=http://[AI_SERVER_IP]:8001
      - CV_SERVER_URL=http://[AI_SERVER_IP]:8002
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - moosinsa_net

  db:
    image: mysql:8.0
    container_name: moosinsa_db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root1234
      - MYSQL_DATABASE=mss_db
      - MYSQL_USER=moosinsa
      - MYSQL_PASSWORD=moosinsa1234
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - moosinsa_net

  redis:
    image: redis:7.2
    container_name: moosinsa_redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
      - redis_data:/data
    command: redis-server /usr/local/etc/redis/redis.conf
    restart: unless-stopped
    networks:
      - moosinsa_net

volumes:
  db_data:
  redis_data:

networks:
  moosinsa_net:
    driver: bridge
