amcl:
  ros__parameters:
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_footprint"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 100.0
    laser_min_range: -1.0
    laser_model_type: "likelihood_field"
    max_beams: 60
    max_particles: 1000
    min_particles: 500
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.01 #0.1
    update_min_d: 0.01 #0.15
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    scan_topic: scan
    set_initial_pose: true
    initial_pose: [0, 0, 0]

bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_link
    odom_topic: odom
    #default_nav_to_pose_bt_xml:
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    # 'default_nav_through_poses_bt_xml' and 'default_nav_to_pose_bt_xml' are use defaults:
    # nav2_bt_navigator/navigate_to_pose_w_replanning_and_recovery.xml
    # nav2_bt_navigator/navigate_through_poses_w_replanning_and_recovery.xml
    # They can be set here or via a RewrittenYaml remap from a parent launch file to Nav2.

    # plugin_lib_names is used to add custom BT plugins to the executor (vector of strings).
    # Built-in plugins are added automatically
    # plugin_lib_names: []

    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

controller_server:
  ros__parameters:
    controller_frequency: 20.0 #20.0 부드러운 움직임ex)로봇이 1초에 몇 번 두뇌 회전을 해서 바퀴에 명령을 내리는가?
    costmap_update_timeout: 0.30
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 1.0 #실패상태 허용 시간
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"] # "precise_goal_checker"

    # 단일 컨트롤러
    controller_plugins: ["FollowPath"]
    use_realtime_priority: false
    enable_stamped_cmd_vel: false

    # Progress checker
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.1
      movement_time_allowance: 15.0

    # Goal checker
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.05
      yaw_goal_tolerance: 0.1 #0.25

    # ★ 여기부터: Regulated Pure Pursuit 컨트롤러 설정
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      # 기본 속도들 (Pinky 상황 맞게 나중에 조정 가능)
      desired_linear_vel: 0.1 #0.20      # [m/s]

      # 경로 추종 관련
      lookahead_dist: 0.15 #0.35
      min_lookahead_dist: 0.18 #0.25
      max_lookahead_dist: 0.20
      lookahead_time: 0.2 #0.3
      transform_tolerance: 0.1 #0.1
      use_velocity_scaled_lookahead_dist: false #true
      use_collision_detection: true
      use_interpolation: true

      # ========= 회전 우선 관련 핵심 파라미터 =========
      # 1) 경로 헤딩과 로봇 헤딩 차이가 나면, 먼저 in-place 회전
      use_rotate_to_heading: true

      # 2) 이 각도(rad) 이상 헤딩 차이가 나면 회전 모드 진입
      #    0.785 ≒ 45도, 0.523 ≒ 30도, 0.35 ≒ 20도
      rotate_to_heading_min_angle: 0.35

      # 3) 회전 속도 (in-place 회전일 때 angular vel)
      rotate_to_heading_angular_vel: 0.5 #1.0 업데이트 주기 내에 너무 많이 돌아 로컬맵 어긋남 발생

      # 4) 회전할 때는 전진 속도 0에 가깝게 (거의 제자리 회전)
      max_angular_accel: 1.0 #3.2 급격한 각가속도도 순간적 맵 어긋남 원인. 부드럽게 낮춤
      allow_reversing: false
      use_rotate_to_heading_threshold: 0.5  # 헤딩 오차 이내면 전진으로 전환

      # ========= goal 근처에서 고개 맞추기 =========
      final_rotation_alpha: 1.0
      allow_final_rotation: true
      use_final_rotation: true

      # ========= 안전 관련 =========
      # 장애물과 너무 가까워지면 속도 줄이거나 정지하는 옵션들
      use_approach_velocity_scaling: true
      min_approach_linear_velocity: 0.08 #0.05
      inflation_cost_scaling_factor: 5.0
      regulated_linear_scaling_min_radius: 0.3 #0.5
      regulated_linear_scaling_min_speed: 0.03 #0.05
      use_cost_regulated_linear_velocity_scaling: false #곡률기반 파라미터 조정 -  코너에서 회전할때 감속하는 기능인데 속도가 이미 작기때문에 필요x
      cost_scaling_dist: 0.15 #0.3
      cost_scaling_gain: 1.5  #1.5


local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 3 #3
      height: 3 #3
      resolution: 0.01 #0.05
      #robot_radius: 0.1
      footprint: '[[0.03, 0.06], [0.03, -0.06], [-0.06, -0.06], [-0.06, 0.06]]' #왼앞, 오른앞, 왼뒤, 오른뒤
      plugins: ["voxel_layer", "inflation_layer"]
      keepout_filter:               # ★ 추가
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: True
        filter_info_topic: "/costmap_filter_info"
        transform_tolerance: 0.1
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 1.0 #3.0
        inflation_radius: 0.01 #0.15
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.01 #0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        footprint_clearing_enabled: True
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      footprint_padding: 0.0 #로봇주위 장막
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      #robot_radius: 0.05
      footprint: '[[0.06, 0.06], [0.06, -0.06], [-0.06, -0.06], [-0.06, 0.06]]'
      resolution: 0.01 #0.05
      track_unknown_space: true
      plugins: ["static_layer", "keepout_static_layer", "obstacle_layer", "inflation_layer"]
      filters: ["keepout_filter"] #keepout 필터 추가
      keepout_static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        map_topic: /keepout_static_map
        subscribe_to_updates: false

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0 #3.0
        inflation_radius: 0.20 #1.0 #0.15
      always_send_full_costmap: True
      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: True
        filter_info_topic: "/costmap_filter_info"
        transform_tolerance: 0.1

# The yaml_filename does not need to be specified since it going to be set by defaults in launch.
# If you'd rather set it in the yaml, remove the default "map" value in the tb3_simulation_launch.py
# file & provide full path to map below. If CLI map configuration or launch default is provided, that will be used.
